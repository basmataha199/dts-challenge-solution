version: '3.8'

services:
  postgres:
    image: postgres:15
    container_name: dts_postgres
    environment:
      POSTGRES_USER: dts_user
      POSTGRES_PASSWORD: dts_password
      POSTGRES_DB: dts_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
